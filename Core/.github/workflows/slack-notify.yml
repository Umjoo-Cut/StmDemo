name: Slack Notify

on:
  push:
  pull_request:
  issues:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "[${{ github.repository }}] ${{ github.actor }} → ${{ github.event_name }}\n${{ github.event.head_commit.message || github.event.pull_request.title || github.event.issue.title }}"
            }